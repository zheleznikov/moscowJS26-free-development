<section class="slide slide--countdown" style="position: relative">
    <span class="slide__hash">#start</span>
    <h2>Начинаем</h2>
    <div class="countdown-wrap" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); margin: 0; pointer-events: none">
        <span class="countdown" style="font-size: 240px; font-weight: bold; line-height: 1; margin: 0">15</span>
    </div>
    <script>
        (function () {
            var section = document.currentScript && document.currentScript.closest('section.slide');
            if (!section) return;
            var el = section.querySelector('.countdown');
            if (!el) return;
            var n = 15;
            var timerId = null;
            function tick() {
                n--;
                if (n < 0) {
                    clearInterval(timerId);
                    timerId = null;
                    el.textContent = 0;
                    return;
                }
                el.textContent = n;
            }
            function isActiveFullscreen() {
                var s = window.shower;
                if (!s || !s.isFullMode) return false;
                var myIndex = section.dataset.slideIndex != null
                    ? Number(section.dataset.slideIndex)
                    : Array.prototype.indexOf.call(s.slides || [], section);
                return myIndex >= 0 && myIndex === s.activeSlideIndex;
            }
            function startTimer() {
                if (timerId != null) return;
                if (n < 0) {
                    n = 15;
                }
                el.textContent = n;
                timerId = setInterval(tick, 1000);
            }
            function stopTimer() {
                if (timerId != null) {
                    clearInterval(timerId);
                    timerId = null;
                }
            }
            function updateTimerState() {
                if (isActiveFullscreen()) {
                    startTimer();
                } else {
                    stopTimer();
                }
            }
            function scheduleUpdate() {
                setTimeout(updateTimerState, 0);
            }
            if (window.shower) {
                window.shower.addEventListener('slidechange', scheduleUpdate);
                window.shower.addEventListener('modechange', scheduleUpdate);
                setTimeout(updateTimerState, 0);
            } else {
                var checkShower = setInterval(function () {
                    if (window.shower) {
                        clearInterval(checkShower);
                        window.shower.addEventListener('slidechange', scheduleUpdate);
                        window.shower.addEventListener('modechange', scheduleUpdate);
                        setTimeout(updateTimerState, 0);
                    }
                }, 50);
            }
        })();
    </script>
</section>
